{% extends "base.html" %}
{% block content %}

<h2>Length Converter</h2>
<form method="post">
    <input type="number" step="any" name="value" required placeholder="Value">
    <select name="from_unit">
        {% for unit in units %}
        <option value="{{ unit }}">{{ unit }}</option>
        {% endfor %}
    </select>
    to
    <select name="to_unit">
        {% for unit in units %}
        <option value="{{ unit }}">{{ unit }}</option>
        {% endfor %}
    </select>
    <button type="submit">Convert</button>
</form>
{% if result is not none %}
    <p>Result: {{ result }}</p>
{% endif %}
{% if error %}
    <p style="color:red;">Error: {{ error }}</p>
{% endif %}
{% endblock %}
